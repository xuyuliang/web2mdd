<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Dict 查词</title>
    <link rel="stylesheet" href="/static/p.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <div class="header">
      <h1>📖 The Little Dict</h1>
      <div class="search-box">
        <input
          type="text"
          name="word"
          placeholder="输入英文单词..."
          autofocus
          hx-get="/api/lookup"
          hx-target="#result"
          hx-trigger="keyup[keyCode==13], search"
          hx-indicator="#loading"
        />
        <button
          hx-get="/api/lookup"
          hx-target="#result"
          hx-include="[name='word']"
          hx-indicator="#loading"
        >
          查词
        </button>
      </div>
    </div>
    <div class="container">
      <div id="loading" class="loading htmx-indicator">🔍 查询中...</div>
      <div id="result"></div>
    </div>
    <script>
      document.body.addEventListener("htmx:afterSwap", function () {
        setTimeout(fixMediaPaths, 50);
      });
      function fixMediaPaths() {
        document.querySelectorAll("#result img").forEach(function (img) {
          var src = img.getAttribute("src");
          if (
            src &&
            !src.startsWith("http") &&
            !src.startsWith("data:") &&
            !src.startsWith("/api/")
          ) {
            img.src = "/api/media/" + encodeURIComponent(src);
          }
        });
        document
          .querySelectorAll(
            '#result a[href$=".mp3"], #result a[href$=".wav"], #result a[href$=".spx"]',
          )
          .forEach(function (a) {
            var href = a.getAttribute("href");
            if (href && !href.startsWith("http") && !href.startsWith("/api/")) {
              a.href = "/api/media/" + encodeURIComponent(href);
            }
          });
        document
          .querySelectorAll("#result audio source")
          .forEach(function (source) {
            var src = source.getAttribute("src");
            if (src && !src.startsWith("http") && !src.startsWith("/api/")) {
              source.src = "/api/media/" + encodeURIComponent(src);
            }
          });
        document
          .querySelectorAll('#result a[href*="sound://"]')
          .forEach(function (a) {
            var href = a.getAttribute("href");
            var m = href.match(/sound:\/\/(.+)/);
            if (m) a.href = "/api/media/" + encodeURIComponent(m[1]);
          });
      }
    </script>
  </body>
</html>
