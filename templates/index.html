<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Dict 查词</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="stylesheet" href="/static/p.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <div class="header" id="header-section">
      <h1>📖 The Little Dict</h1>
      <div class="search-box">
        <input
          type="text"
          name="word"
          placeholder="输入英文单词..."
          autofocus
          hx-get="/api/lookup"
          hx-target="#result"
          hx-trigger="keyup[keyCode==13], search"
          hx-push-url="true"
          hx-indicator="#loading"
        />
        <button
          hx-get="/api/lookup"
          hx-target="#result"
          hx-include="[name='word']"
          hx-push-url="true"
          hx-indicator="#loading"
        >
          查词
        </button>
      </div>
    </div>
    <div class="container">
      <div id="loading" class="loading htmx-indicator">🔍 查询中...</div>
      <div id="result"></div>
    </div>

    <script>
      // 监听浏览器历史回退事件
      window.addEventListener('popstate', function(event) {
        // 获取当前 URL 中的 word 参数
        const url = new URL(window.location.href);
        const word = url.searchParams.get('word');
        
        if (word) {
          console.log('[DEBUG] 检测到历史回退，重新搜索:', word);
          htmx.ajax('GET', '/api/lookup?word=' + encodeURIComponent(word), '#result');
        } else {
          console.log('[DEBUG] 检测到历史回退到首页');
          document.getElementById('result').innerHTML = '<em>结果区域</em>';
          document.querySelector("[name='word']").value = '';
        }
      });

      // 页面加载时检查 URL 参数，自动触发搜索
      document.addEventListener('DOMContentLoaded', function() {
        const url = new URL(window.location.href);
        const initialWord = url.searchParams.get('word');
        if (initialWord) {
          console.log('[DEBUG] 页面加载时检测到 word 参数，自动搜索:', initialWord);
          document.querySelector("[name='word']").value = initialWord;
          htmx.ajax('GET', '/api/lookup?word=' + encodeURIComponent(initialWord), '#result');
        }

        // 当用户在 .affix-word-breakdown 中选中文本后，自动正则搜索
        const searchInput = document.querySelector("[name='word']");
        if (!searchInput) return;

        const resultDiv = document.getElementById('result');
        if (resultDiv) {
          resultDiv.addEventListener('mouseup', function(e) {
            const breakdownEl = e.target.closest('.affix-word-breakdown');
            if (!breakdownEl) return;

            const selection = window.getSelection().toString().replace(/[\s.]+/g, '').trim();

            if (!selection) return;

            // 构造正则搜索词 *selected*
            const pattern = '*' + selection + '*';
            searchInput.value = pattern;

            // 获取当前的 back_word 和 back_page（如果存在），以便传递下去
            const currentUrl = new URL(window.location.href);
            let backWord = currentUrl.searchParams.get('back_word');
            let backPage = currentUrl.searchParams.get('back_page');

            // 如果当前 URL 中没有 back_word，说明是从普通单词搜索进入的，
            // 需要将当前搜索的单词作为 back_word 传递，以便从模式搜索结果返回
            if (!backWord) {
                backWord = currentUrl.searchParams.get('word');
            }

            // 构造 API URL，携带 back_word 和 back_page 参数
            let apiUrl = '/api/lookup?word=' + encodeURIComponent(pattern);
            if (backWord) {
                apiUrl += '&back_word=' + encodeURIComponent(backWord);
            }
            if (backPage) {
                apiUrl += '&back_page=' + encodeURIComponent(backPage);
            }

            // 触发搜索（后端通过 HX-Push header 自动更新 URL，无需手动 pushState）
            htmx.ajax('GET', apiUrl, '#result');

            // 清空选区
            window.getSelection().removeAllRanges();
          });
        }
      });
    </script>
  </body>
</html>
