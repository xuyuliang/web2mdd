<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Dict 查词</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="stylesheet" href="/static/p.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <div class="header" id="header-section">
      <h1>📖 The Little Dict</h1>
      <div class="search-box">
        <input
          type="text"
          name="word"
          placeholder="输入英文单词..."
          autofocus
          hx-get="/api/lookup"
          hx-target="#result"
          hx-trigger="keyup[keyCode==13], search"
          hx-indicator="#loading"
        />
        <button
          hx-get="/api/lookup"
          hx-target="#result"
          hx-include="[name='word']"
          hx-indicator="#loading"
        >
          查词
        </button>
      </div>
    </div>
    <div class="container">
      <div id="loading" class="loading htmx-indicator">🔍 查询中...</div>
      <div id="result"></div>
    </div>

    <script>
      // 当用户在 .affix-word-breakdown 中选中文本后，自动正则搜索
      document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.querySelector("[name='word']");
        if (!searchInput) return;

        const resultDiv = document.getElementById('result');
        if (resultDiv) {
          resultDiv.addEventListener('mouseup', function(e) {
            const breakdownEl = e.target.closest('.affix-word-breakdown');
            if (!breakdownEl) return;

            const selection = window.getSelection().toString().replace(/[\s.]+/g, '').trim();

            if (!selection) return;

            // 构造正则搜索词 *selected*
            const pattern = '*' + selection + '*';
            searchInput.value = pattern;

            // 获取当前的 back_word 和 back_page（如果存在），以便传递下去
            const currentUrl = new URL(window.location.href);
            const backWord = currentUrl.searchParams.get('back_word');
            const backPage = currentUrl.searchParams.get('back_page');

            // 构造 API URL，携带 back_word 和 back_page 参数
            let apiUrl = '/api/lookup?word=' + encodeURIComponent(pattern);
            if (backWord) {
                apiUrl += '&back_word=' + encodeURIComponent(backWord);
            }
            if (backPage) {
                apiUrl += '&back_page=' + encodeURIComponent(backPage);
            }

            // 触发表单搜索
            htmx.ajax('GET', apiUrl, '#result');

            // 清空选区
            window.getSelection().removeAllRanges();
          });
        }
      });
    </script>
  </body>
</html>
